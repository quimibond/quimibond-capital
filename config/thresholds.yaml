# Thresholds editables — toda decisión de "tamaño / edad / corte" vive aquí.
# Cualquier ajuste de estos valores cambia el output del pipeline sin tocar código.

revenue_brackets_usd_mm:
  platform_min: 50      # mínimo para PLATFORM_CANDIDATE
  bolt_on_min: 10       # rango bolt-on
  bolt_on_max: 50
  tuck_in_min: 1        # rango tuck-in
  tuck_in_max: 10
  out_of_scope_max: 1   # < 1M USD no entra al pipeline

employee_brackets:
  platform_min: 200
  bolt_on_min: 50
  tuck_in_min: 10

age_thresholds:
  edad_madura_min: 20         # años desde incorporación
  fatigue_age_high: 40        # disparador de fatiga alta
  fatigue_age_medium: 25      # disparador de fatiga media

productivity_thresholds_usd_per_employee:
  high: 200000
  medium: 100000
  low: 50000

# Geografía: prioridad por entidad (CVE_ENT INEGI)
priority_states:
  cluster_textil: ["09", "13", "15", "21", "29"]   # CDMX, Hidalgo, EdoMex, Puebla, Tlaxcala
  cluster_automotriz: ["19", "05", "22", "01", "11", "24"]  # NL, Coah, Qro, Ags, Gto, SLP

# Saturación
saturation:
  consolidated_ratio_atractivo_max: 0.30    # < 30% consolidado = atractivo
  consolidated_ratio_saturado_min: 0.60     # > 60% consolidado = saturado
  min_companies_for_verdict: 5              # debajo de esto = "Insuficiente"

# Filtros de exclusión (NO entran al pipeline)
exclusion:
  naics_excluded: ["3151", "3152", "3159"]   # calcetería moda, confección prendas, accesorios vestir
  activity_keywords_excluded:
    - "comercio al por mayor"
    - "comercio al por menor"
    - "venta al por mayor"
    - "distribuidor"
    - "importac"
